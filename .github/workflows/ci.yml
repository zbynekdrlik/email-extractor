name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: email-extractor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install OCR system deps
        run: |
          # Drop the runner's preinstalled 3rd-party apt sources (azure-cli / microsoft)
          # — they intermittently 403 and break `apt-get update`; tesseract/poppler are
          # in the standard Ubuntu repos and don't need them.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-ces tesseract-ocr-slk poppler-utils
      - name: Install Python deps
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest + coverage)
        env:
          PG_TEST_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=65

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read add-on version
        id: ver
        run: |
          v=$(grep '^version:' email-extractor/config.yaml | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build add-on image (push only on main)
        uses: docker/build-push-action@v6
        with:
          context: email-extractor
          file: email-extractor/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/zbynekdrlik/email-extractor-amd64:${{ steps.ver.outputs.version }}
            ghcr.io/zbynekdrlik/email-extractor-amd64:latest
