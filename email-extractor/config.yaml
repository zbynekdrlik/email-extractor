name: Email OCR Extractor
version: "0.1.0"
slug: email_extractor
description: Reads an IMAP mailbox, OCR-extracts the body + all attachments, and writes Postgres for n8n.
url: https://github.com/zbynekdrlik/email-extractor
arch:
  - amd64
init: false
image: ghcr.io/zbynekdrlik/email-extractor-{arch}
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": Internal file API for n8n (original attachments + raw .eml)
options:
  imap_host: ""
  imap_port: 993
  imap_user: ""
  imap_pass: ""
  folders: "INBOX"
  poll_interval: 60
  pg_dsn: ""
  public_base_url: ""
  api_token: ""
  http_port: 8099
  data_dir: "/data/store"
schema:
  imap_host: str
  imap_port: int
  imap_user: str
  imap_pass: password
  folders: str
  poll_interval: int
  pg_dsn: str
  public_base_url: str?
  api_token: password?
  http_port: int
  data_dir: str
